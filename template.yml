ROSTemplateFormatVersion: '2015-09-01'
Transform: 'Aliyun::Serverless-2018-04-03'
Resources:
  chioio.tech: #service name
    Type: 'Aliyun::Serverless::Service'
    Properties: 
      Description: This is FC service
    site-app: # function name
      Type: 'Aliyun::Serverless::Function'
      Properties:
        Handler: index.handler
        Runtime: nodejs12
        CodeUri: .
        MemorySize: 128
        Timeout: 15
      Events:
        http-trigger:
          Type: HTTP
          Properties:
            AuthType: ANONYMOUS
            Methods: ['GET', 'POST', 'PUT', 'DELETE', 'HEAD']
  chioio.tech: # domain name
    Type: 'Aliyun::Serverless::CustomDomain'
    Properties:
      Protocol: HTTP
      RouteConfig:
        routes:
          '/':
            ServiceName: chioio.tech # service name
            FunctionName: site-app # function name
  